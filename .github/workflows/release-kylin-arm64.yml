name: Release Kylin ARM64 Docker Tar

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Kylin ARM64 image
        run: |
          docker build \
            --platform linux/arm64 \
            -f Dockerfile.kylin \
            -t kylin-offline-mcp-echarts:${{ inputs.tag }}-arm64 .

      - name: Verify image platform and runtime
        run: |
          docker image inspect kylin-offline-mcp-echarts:${{ inputs.tag }}-arm64 --format '{{.Os}}/{{.Architecture}}'
          test "$(docker image inspect kylin-offline-mcp-echarts:${{ inputs.tag }}-arm64 --format '{{.Os}}/{{.Architecture}}')" = "linux/arm64"
          docker run --rm kylin-offline-mcp-echarts:${{ inputs.tag }}-arm64 node -e "const p=require('/app/package-lock.json'); const s=JSON.stringify(p); if (s.includes('@napi-rs/canvas') || s.includes('node_modules/canvas')) process.exit(1); console.log('no canvas native dependency')"
          docker run --rm kylin-offline-mcp-echarts:${{ inputs.tag }}-arm64 rsvg-convert --version

      - name: Save Docker tar
        run: |
          docker save kylin-offline-mcp-echarts:${{ inputs.tag }}-arm64 | gzip -9 > kylin-offline-mcp-echarts-${{ inputs.tag }}-linux-arm64.tar.gz
          sha256sum kylin-offline-mcp-echarts-${{ inputs.tag }}-linux-arm64.tar.gz > kylin-offline-mcp-echarts-${{ inputs.tag }}-linux-arm64.tar.gz.sha256

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Kylin Offline MCP ECharts ${{ inputs.tag }}
          body: |
            Offline MCP ECharts SSE server for Kylin ARM64 64KB PAGE_SIZE targets.

            Rendering path:
            ECharts SVG SSR -> rsvg-convert PNG -> /charts static URL -> MCP SSE JSON text.

            Download:
            https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/kylin-offline-mcp-echarts-${{ inputs.tag }}-linux-arm64.tar.gz

            Gitproxy:
            https://gh.llkk.cc/https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/kylin-offline-mcp-echarts-${{ inputs.tag }}-linux-arm64.tar.gz
          files: |
            kylin-offline-mcp-echarts-${{ inputs.tag }}-linux-arm64.tar.gz
            kylin-offline-mcp-echarts-${{ inputs.tag }}-linux-arm64.tar.gz.sha256
